name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace

  ts:
    name: TypeScript client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run build --workspace=@agent-ctrl/client
      - run: npm run test --workspace=@agent-ctrl/client

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo build -q -p agent-ctrl-cli -p agent-ctrl-uia-fixture
      - shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $env:AGENT_CTRL_HOME = Join-Path $env:RUNNER_TEMP "agent-ctrl-mock-home"
          New-Item -ItemType Directory -Force -Path $env:AGENT_CTRL_HOME | Out-Null
          .\target\debug\agent-ctrl.exe info
          .\target\debug\agent-ctrl.exe open mock --session mock
          .\target\debug\agent-ctrl.exe snapshot --session mock
          .\target\debug\agent-ctrl.exe get name '@e0' --session mock
          .\target\debug\agent-ctrl.exe is enabled '@e0' --session mock
          Set-Content -Path batch.json -Encoding utf8 -Value '[{"op":"find","query":{"limit":1}}]'
          .\target\debug\agent-ctrl.exe batch --file batch.json --session mock
          .\target\debug\agent-ctrl.exe close --session mock
      - run: cargo test -q -p agent-ctrl-cli --test windows_uia_fixture
        env:
          RUN_UIA_TESTS: "1"
        if: runner.os == 'Windows'
      - run: npm run test --workspace=@agent-ctrl/client
        env:
          RUN_UIA_TESTS: "1"
        if: runner.os == 'Windows'
      - run: .\target\debug\agent-ctrl.exe close --session mock
        if: always()
        continue-on-error: true

  macos-smoke:
    name: macOS smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -q -p agent-ctrl-cli
      # The AX fixture test (RUN_AX_TESTS=1) needs Accessibility +
      # Screen Recording grants on the runner, which CI doesn't have.
      # Stick to the mock-surface smoke + the doctor probe; both
      # exercise the daemon spawn / TCP / dispatch path the same way
      # windows-smoke does, and `info` confirms factory.rs reports AX
      # as ready (not stub) on the macOS host.
      - run: |
          set -euo pipefail
          export AGENT_CTRL_HOME="$RUNNER_TEMP/agent-ctrl-mock-home"
          mkdir -p "$AGENT_CTRL_HOME"
          ./target/debug/agent-ctrl info
          ./target/debug/agent-ctrl doctor --quick
          ./target/debug/agent-ctrl open mock --session mock
          ./target/debug/agent-ctrl snapshot --session mock
          ./target/debug/agent-ctrl get name '@e0' --session mock
          ./target/debug/agent-ctrl is enabled '@e0' --session mock
          printf '%s' '[{"op":"find","query":{"limit":1}}]' > batch.json
          ./target/debug/agent-ctrl batch --file batch.json --session mock
          ./target/debug/agent-ctrl close --session mock
      - run: ./target/debug/agent-ctrl close --session mock
        if: always()
        continue-on-error: true
